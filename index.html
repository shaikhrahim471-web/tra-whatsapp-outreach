<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRA Outreach — BTR 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#090c14;color:#e2e8f0;min-height:100vh;}

/* Layout */
.app{display:grid;grid-template-columns:300px 1fr;min-height:100vh;}
.sidebar{background:#0d1117;border-right:1px solid #1e2535;padding:24px;display:flex;flex-direction:column;gap:20px;}
.main{padding:28px;overflow-y:auto;}

/* Sidebar */
.logo{font-size:13px;font-weight:700;color:#25d366;letter-spacing:1.5px;text-transform:uppercase;}
.logo span{color:#4a5568;font-weight:400;}
.sidebar-section{display:flex;flex-direction:column;gap:8px;}
.sidebar-label{font-size:10px;color:#4a5568;text-transform:uppercase;letter-spacing:1px;font-weight:600;}
textarea.brand-input{background:#060911;border:1px solid #1e2535;border-radius:8px;color:#e2e8f0;font-size:13px;padding:12px;resize:vertical;font-family:'Inter',sans-serif;line-height:1.6;min-height:180px;width:100%;}
textarea.brand-input:focus{outline:none;border-color:#25d366;}
textarea.brand-input::placeholder{color:#2d3748;}
.btn-research{width:100%;background:#25d366;color:#000;border:none;border-radius:8px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;font-family:'Inter',sans-serif;}
.btn-research:hover{background:#1db954;}
.btn-research:disabled{background:#1a2535;color:#4a5568;cursor:not-allowed;}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.stat-box{background:#060911;border:1px solid #1e2535;border-radius:8px;padding:12px;text-align:center;}
.stat-num{font-size:22px;font-weight:700;color:#fff;}
.stat-num.green{color:#25d366;}
.stat-num.yellow{color:#f59e0b;}
.stat-num.red{color:#ef4444;}
.stat-label{font-size:10px;color:#4a5568;margin-top:2px;text-transform:uppercase;letter-spacing:0.5px;}

/* Main area */
.main-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.main-title{font-size:18px;font-weight:700;color:#fff;}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;}
.filter-btn{padding:5px 12px;border-radius:20px;border:1px solid #1e2535;background:transparent;color:#4a5568;font-size:11px;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s;font-weight:500;}
.filter-btn:hover{border-color:#25d366;color:#25d366;}
.filter-btn.active{background:#25d366;color:#000;border-color:#25d366;font-weight:700;}

/* Cards */
.cards{display:flex;flex-direction:column;gap:10px;margin-top:16px;}
.contact-card{background:#0d1117;border:1px solid #1e2535;border-radius:12px;overflow:hidden;transition:border-color 0.2s;}
.contact-card.high{border-left:3px solid #25d366;}
.contact-card.medium{border-left:3px solid #f59e0b;}
.contact-card.low{border-left:3px solid #ef4444;}
.contact-card.sent{opacity:0.5;}
.card-body{padding:16px;display:flex;align-items:flex-start;gap:14px;}
.card-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0;}
.avatar-high{background:linear-gradient(135deg,#1a6b3a,#25d366);}
.avatar-medium{background:linear-gradient(135deg,#7c4a00,#f59e0b);}
.avatar-low{background:linear-gradient(135deg,#7c1a1a,#ef4444);}
.card-info{flex:1;min-width:0;}
.card-name{font-size:14px;font-weight:600;color:#fff;}
.card-designation{font-size:12px;color:#64748b;margin-top:1px;}
.card-brand{font-size:11px;color:#4a5568;margin-top:4px;}
.card-badges{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap;align-items:center;}
.badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;}
.badge-high{background:#25d36618;color:#25d366;border:1px solid #25d36630;}
.badge-medium{background:#f59e0b18;color:#f59e0b;border:1px solid #f59e0b30;}
.badge-low{background:#ef444418;color:#ef4444;border:1px solid #ef444430;}
.badge-ai{background:#1e2535;color:#64748b;border:1px solid #2d3748;}
.badge-verified{background:#0f3d22;color:#25d366;border:1px solid #25d36640;}
.badge-sent{background:#25d36618;color:#25d366;border:1px solid #25d36630;}
.card-phone{font-size:11px;color:#25d366;font-family:monospace;margin-top:5px;}
.card-phone.bad{color:#ef4444;}
.card-note{font-size:11px;color:#4a5568;margin-top:4px;font-style:italic;}
.card-actions{display:flex;flex-direction:column;gap:6px;align-items:flex-end;flex-shrink:0;}
.btn-send{background:#25d366;color:#000;border:none;border-radius:7px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap;}
.btn-send:hover{background:#1db954;}
.btn-send:disabled{background:#1a2535;color:#4a5568;cursor:not-allowed;}
.btn-edit{background:transparent;color:#4a5568;border:1px solid #1e2535;border-radius:7px;padding:7px 12px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;}
.btn-edit:hover{border-color:#4a5568;color:#94a3b8;}

/* Edit panel */
.edit-panel{background:#060911;border-top:1px solid #1e2535;padding:16px;display:none;}
.edit-panel.open{display:block;}
.edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.edit-field label{display:block;font-size:10px;color:#4a5568;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:5px;font-weight:600;}
.edit-field input,.edit-field select{width:100%;background:#0d1117;border:1px solid #1e2535;border-radius:6px;color:#e2e8f0;font-size:12px;padding:8px 10px;font-family:'Inter',sans-serif;}
.edit-field input:focus,.edit-field select:focus{outline:none;border-color:#25d366;}
.edit-field select option{background:#0d1117;}
.edit-actions{display:flex;gap:8px;}
.btn-save{background:#25d366;color:#000;border:none;border-radius:7px;padding:8px 16px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;}
.btn-cancel-edit{background:transparent;color:#4a5568;border:1px solid #1e2535;border-radius:7px;padding:7px 14px;font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;}

/* Loading state */
.loading-card{background:#0d1117;border:1px solid #1e2535;border-radius:12px;padding:16px;display:flex;align-items:center;gap:14px;}
.spinner{width:20px;height:20px;border:2px solid #1e2535;border-top-color:#25d366;border-radius:50%;animation:spin 0.8s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:13px;color:#4a5568;}
.loading-brand{color:#94a3b8;font-weight:600;}

/* Empty state */
.empty-state{text-align:center;padding:60px 20px;color:#2d3748;}
.empty-icon{font-size:40px;margin-bottom:12px;}
.empty-title{font-size:15px;font-weight:600;color:#4a5568;margin-bottom:6px;}
.empty-sub{font-size:12px;color:#2d3748;}

/* Progress bar */
.progress-wrap{margin-bottom:4px;}
.progress-bar{height:3px;background:#1e2535;border-radius:2px;overflow:hidden;margin-bottom:16px;}
.progress-fill{height:100%;background:#25d366;border-radius:2px;transition:width 0.4s;}
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div>
      <div class="logo">TRA <span>Outreach</span></div>
      <div style="font-size:11px;color:#2d3748;margin-top:3px;">BTR 2026 Campaign</div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Add Brands</div>
      <textarea class="brand-input" id="brandInput" placeholder="Enter brand names, one per line:

Manish Malhotra
Citibank
Lipton
Biba
Ariel
..."></textarea>
      <div style="font-size:10px;color:#2d3748;">One brand per line. AI will find the right contact.</div>
      <button class="btn-research" id="researchBtn" onclick="startResearch()">🔍 Research Contacts</button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Campaign Stats</div>
      <div class="stats">
        <div class="stat-box">
          <div class="stat-num" id="stat-total">0</div>
          <div class="stat-label">Total</div>
        </div>
        <div class="stat-box">
          <div class="stat-num green" id="stat-sent">0</div>
          <div class="stat-label">Sent</div>
        </div>
        <div class="stat-box">
          <div class="stat-num green" id="stat-high">0</div>
          <div class="stat-label">High Conf.</div>
        </div>
        <div class="stat-box">
          <div class="stat-num yellow" id="stat-medium">0</div>
          <div class="stat-label">Medium</div>
        </div>
        <div class="stat-box">
          <div class="stat-num red" id="stat-low">0</div>
          <div class="stat-label">Low / Review</div>
        </div>
        <div class="stat-box">
          <div class="stat-num green" id="stat-verified">0</div>
          <div class="stat-label">Verified</div>
        </div>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="main-header">
      <div class="main-title">Contacts</div>
      <div class="filter-row">
        <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
        <button class="filter-btn" onclick="setFilter('high',this)">🟢 High</button>
        <button class="filter-btn" onclick="setFilter('medium',this)">🟡 Medium</button>
        <button class="filter-btn" onclick="setFilter('low',this)">🔴 Low</button>
        <button class="filter-btn" onclick="setFilter('verified',this)">✓ Verified</button>
        <button class="filter-btn" onclick="setFilter('pending',this)">Not Sent</button>
      </div>
    </div>

    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

    <div id="cards" class="cards">
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <div class="empty-title">No contacts yet</div>
        <div class="empty-sub">Enter brand names on the left and hit Research Contacts</div>
      </div>
    </div>
  </div>
</div>

<script>
let contacts = [];
let currentFilter = 'all';
let isResearching = false;

const ANTHROPIC_PROMPT = (brand) => `You are a B2B sales intelligence expert helping identify the right marketing decision-maker to contact about brand recognition.

The brand is: "${brand}"

Task: Identify the single best person to contact about their brand's recognition in India's Brand Trust Report 2026.

Rules:
- If this brand is a sub-brand under a parent company (e.g. Lipton under HUL, Horlicks under HUL), identify the Brand Manager or Brand Director SPECIFIC to that sub-brand — NOT the parent company's CMO.
- If this is a standalone brand/company (e.g. Biba, Ariel where it IS the main company), identify the CMO or Head of Marketing.
- If CMO is hands-on with this specific brand's identity (common in mid-sized companies), prefer CMO.
- The qualifying test: does this person wake up thinking about THIS brand's performance specifically?

Respond ONLY with a JSON object, no markdown, no explanation:
{
  "name": "Full Name",
  "designation": "Exact Title",
  "company": "Company Name",
  "brand_type": "standalone or sub-brand",
  "parent_company": "Parent company name if sub-brand, else null",
  "confidence": "high or medium or low",
  "confidence_reason": "One sentence explaining why this confidence level",
  "linkedin_hint": "Their likely LinkedIn search query",
  "category": "Brand category (e.g. Designer Wear, FMCG, Banking)"
}

If you cannot identify a specific person with reasonable confidence, still return the JSON but set confidence to "low" and use best available information.`;

async function startResearch() {
  const input = document.getElementById('brandInput').value.trim();
  if (!input) { alert('Please enter at least one brand name.'); return; }
  if (isResearching) return;

  const brands = input.split('\n').map(b => b.trim()).filter(b => b.length > 0);
  if (brands.length === 0) return;

  isResearching = true;
  document.getElementById('researchBtn').disabled = true;
  document.getElementById('researchBtn').textContent = '⏳ Researching...';

  const cardsEl = document.getElementById('cards');
  cardsEl.innerHTML = '';

  for (let i = 0; i < brands.length; i++) {
    const brand = brands[i];

    // Show loading card
    const loadingEl = document.createElement('div');
    loadingEl.className = 'loading-card';
    loadingEl.id = 'loading-' + i;
    loadingEl.innerHTML = `<div class="spinner"></div><div class="loading-text">Researching <span class="loading-brand">${brand}</span>...</div>`;
    cardsEl.appendChild(loadingEl);

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          tools: [{ type: 'web_search_20250305', name: 'web_search' }],
          messages: [{ role: 'user', content: ANTHROPIC_PROMPT(brand) }]
        })
      });

      const data = await response.json();
      
      // Extract JSON from response
      let result = null;
      for (const block of data.content || []) {
        if (block.type === 'text' && block.text) {
          try {
            const clean = block.text.replace(/```json|```/g, '').trim();
            result = JSON.parse(clean);
            break;
          } catch(e) {
            // try next block
          }
        }
      }

      if (!result) throw new Error('Could not parse response');

      const contact = {
        id: Date.now() + i,
        brand: brand,
        name: result.name || 'Unknown',
        designation: result.designation || '',
        company: result.company || brand,
        category: result.category || '',
        brand_type: result.brand_type || 'standalone',
        parent_company: result.parent_company || null,
        confidence: result.confidence || 'medium',
        confidence_reason: result.confidence_reason || '',
        linkedin_hint: result.linkedin_hint || '',
        phone: null,
        phoneRaw: '',
        source: 'ai',
        sent: false,
        editOpen: false
      };

      contacts.push(contact);
      
      // Remove loading, add real card
      loadingEl.remove();
      renderCard(contact, contacts.length - 1);

    } catch(err) {
      loadingEl.innerHTML = `<div style="color:#ef4444;font-size:12px;">⚠ Could not research <strong>${brand}</strong> — ${err.message}</div>`;
    }

    updateStats();
  }

  isResearching = false;
  document.getElementById('researchBtn').disabled = false;
  document.getElementById('researchBtn').textContent = '🔍 Research Contacts';
  document.getElementById('brandInput').value = '';
}

function renderCard(c, idx) {
  if (!matchesFilter(c)) return;
  
  const cardsEl = document.getElementById('cards');
  const emptyState = cardsEl.querySelector('.empty-state');
  if (emptyState) emptyState.remove();

  const avatarInitials = c.name.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
  const avatarClass = `avatar-${c.confidence}`;
  
  const parentNote = c.brand_type === 'sub-brand' && c.parent_company 
    ? `Sub-brand under ${c.parent_company}` : '';

  const div = document.createElement('div');
  div.className = `contact-card ${c.confidence}`;
  div.id = `card-${c.id}`;
  div.innerHTML = `
    <div class="card-body">
      <div class="card-avatar ${avatarClass}">${avatarInitials}</div>
      <div class="card-info">
        <div class="card-name">${c.name}</div>
        <div class="card-designation">${c.designation}</div>
        <div class="card-brand">${c.brand} ${c.category ? '· '+c.category : ''} ${c.company !== c.brand ? '· '+c.company : ''}</div>
        <div class="card-badges">
          ${confBadge(c.confidence)}
          ${sourceBadge(c.source)}
          ${c.sent ? '<span class="badge badge-sent">✓ Sent</span>' : ''}
        </div>
        ${c.confidence_reason ? `<div class="card-note">${c.confidence_reason}</div>` : ''}
        ${c.phone ? `<div class="card-phone">${c.phone}</div>` : `<div class="card-phone bad">No phone — add via Edit</div>`}
        ${parentNote ? `<div class="card-note" style="color:#f59e0b;">${parentNote}</div>` : ''}
      </div>
      <div class="card-actions">
        <button class="btn-send" ${!c.phone || c.sent ? 'disabled' : ''} onclick="openWhatsApp('${c.id}')">${c.sent ? '✓ Sent' : 'Send on WhatsApp'}</button>
        <button class="btn-edit" onclick="toggleEdit('${c.id}')">✎ Edit</button>
      </div>
    </div>
    <div class="edit-panel" id="edit-${c.id}">
      <div class="edit-grid">
        <div class="edit-field">
          <label>Name</label>
          <input type="text" id="en-${c.id}" value="${c.name}">
        </div>
        <div class="edit-field">
          <label>Designation</label>
          <input type="text" id="ed-${c.id}" value="${c.designation}">
        </div>
        <div class="edit-field">
          <label>Phone Number</label>
          <input type="text" id="ep-${c.id}" placeholder="+91 98XXX XXXXX" value="${c.phoneRaw}">
        </div>
        <div class="edit-field">
          <label>Confidence</label>
          <select id="ec-${c.id}">
            <option value="high" ${c.confidence==='high'?'selected':''}>🟢 High</option>
            <option value="medium" ${c.confidence==='medium'?'selected':''}>🟡 Medium</option>
            <option value="low" ${c.confidence==='low'?'selected':''}>🔴 Low</option>
          </select>
        </div>
      </div>
      <div class="edit-actions">
        <button class="btn-save" onclick="saveEdit('${c.id}')">Save & Mark Verified</button>
        <button class="btn-cancel-edit" onclick="closeEdit('${c.id}')">Cancel</button>
      </div>
    </div>
  `;
  cardsEl.appendChild(div);
}

function confBadge(conf) {
  const map = {high:['badge-high','🟢 High Confidence'],medium:['badge-medium','🟡 Medium Confidence'],low:['badge-low','🔴 Low — Review needed']};
  const [cls,label] = map[conf]||map.medium;
  return `<span class="badge ${cls}">${label}</span>`;
}

function sourceBadge(source) {
  return source === 'verified'
    ? `<span class="badge badge-verified">✓ Verified by you</span>`
    : `<span class="badge badge-ai">AI Research</span>`;
}

function toggleEdit(id) {
  const panel = document.getElementById('edit-' + id);
  panel.classList.toggle('open');
}

function closeEdit(id) {
  document.getElementById('edit-' + id).classList.remove('open');
}

function saveEdit(id) {
  const c = contacts.find(x => x.id == id);
  if (!c) return;
  c.name = document.getElementById('en-' + id).value.trim() || c.name;
  c.designation = document.getElementById('ed-' + id).value.trim();
  c.phoneRaw = document.getElementById('ep-' + id).value.trim();
  c.phone = fixPhone(c.phoneRaw);
  c.confidence = document.getElementById('ec-' + id).value;
  c.source = 'verified';

  // Re-render that card
  const cardEl = document.getElementById('card-' + id);
  cardEl.remove();
  renderCard(c, contacts.indexOf(c));
  updateStats();
}

function openWhatsApp(id) {
  const c = contacts.find(x => x.id == id);
  if (!c || !c.phone) return;
  const msg = "Hi " + c.name.split(' ')[0] + ", I am Rahim reaching out from TRA Research, we are India's leading brand analytics and consumers buying intent measuring company. What we do is rank brands on the basis of Trust by conducting primary syndicated study in India. We have been doing this for the past 15 years and last month we have launched the 15th edition of Brand Trust Report 2026. As per this your brand " + c.brand + " has been recognised as India's Most Trusted " + c.category + " Brand 2026. And I personally wanted to share this insight with you.";
  window.open('https://web.whatsapp.com/send?phone=' + c.phone.replace('+','') + '&text=' + encodeURIComponent(msg), '_blank');
  c.sent = true;
  const cardEl = document.getElementById('card-' + id);
  cardEl.remove();
  renderCard(c, contacts.indexOf(c));
  updateStats();
}

function fixPhone(raw) {
  if (!raw) return null;
  let s = String(raw).trim();
  if (/\d+\.?\d*[eE][+\-]?\d+/.test(s)) { let n = parseFloat(s); if (!isNaN(n)) s = Math.round(n).toString(); }
  s = s.replace(/[\s\-\(\)]/g,'').replace(/^\+/,'');
  if (s.startsWith('91') && s.length===12) return '+'+s;
  if (s.length===10 && s.match(/^\d+$/)) return '+91'+s;
  if (s.length===12 && s.match(/^\d+$/)) return '+'+s;
  return null;
}

function matchesFilter(c) {
  if (currentFilter==='all') return true;
  if (currentFilter==='high') return c.confidence==='high';
  if (currentFilter==='medium') return c.confidence==='medium';
  if (currentFilter==='low') return c.confidence==='low';
  if (currentFilter==='verified') return c.source==='verified';
  if (currentFilter==='pending') return !c.sent;
  return true;
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  // Re-render all cards
  const cardsEl = document.getElementById('cards');
  cardsEl.innerHTML = '';
  if (contacts.length === 0) {
    cardsEl.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">No contacts yet</div><div class="empty-sub">Enter brand names on the left and hit Research Contacts</div></div>';
    return;
  }
  contacts.forEach((c,i) => renderCard(c,i));
}

function updateStats() {
  const total = contacts.length;
  const sent = contacts.filter(c=>c.sent).length;
  const high = contacts.filter(c=>c.confidence==='high').length;
  const medium = contacts.filter(c=>c.confidence==='medium').length;
  const low = contacts.filter(c=>c.confidence==='low').length;
  const verified = contacts.filter(c=>c.source==='verified').length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-sent').textContent = sent;
  document.getElementById('stat-high').textContent = high;
  document.getElementById('stat-medium').textContent = medium;
  document.getElementById('stat-low').textContent = low;
  document.getElementById('stat-verified').textContent = verified;
  const valid = contacts.filter(c=>c.phone).length;
  document.getElementById('progressFill').style.width = valid > 0 ? (sent/valid*100)+'%' : '0%';
}
</script>
</body>
</html>
